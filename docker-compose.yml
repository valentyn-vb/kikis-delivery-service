services:
  postgres:
    image: postgres:18-alpine
    container_name: kikis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kiki
      POSTGRES_PASSWORD: kiki
      POSTGRES_DB: kikis_delivery
    ports:
      - "5432:5432"
    volumes:
      - kikis-pgdata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiki -d kikis_delivery"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kikis-pgdata:
